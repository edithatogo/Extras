name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: windows-latest
    strategy:
      matrix:
        shell: [powershell, pwsh]
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - name: Checkout Bucket
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need at least 2 commits to properly gather changed files for linting
          fetch-depth: 2
          path: 'my_bucket'
      - name: Checkout Scoop
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ScoopInstaller/Scoop
          path: 'scoop_core'
      - name: Install and cache test dependencies
        uses: potatoqualitee/psmodulecache@ee5e9494714abf56f6efbfa51527b2aec5c761b8 # v6.2.1
        with:
          modules-to-cache: BuildHelpers, Pester
          shell: ${{ matrix.shell }}
      - name: Run tests
        run: |
          $env:SCOOP_HOME="$(Convert-Path '.\scoop_core')"
          .\my_bucket\bin\test.ps1
      - name: Validate package contracts
        run: |
          .\my_bucket\tools\package-audit\Test-PackageContracts.ps1
      - name: Validate package submission readiness
        run: |
          .\my_bucket\tools\package-audit\Test-SubmissionReadiness.ps1
      - name: Validate CI contracts
        run: |
          .\my_bucket\tools\package-audit\Test-CiContracts.ps1
      - name: Run package factory tests
        run: |
          $pester = Get-Module Pester -ListAvailable | Sort-Object Version -Descending | Select-Object -First 1
          if ($pester.Version.Major -ge 5) {
            Invoke-Pester .\my_bucket\bin\Package-Factory.Tests.ps1 -Output Detailed
          } else {
            Invoke-Pester .\my_bucket\bin\Package-Factory.Tests.ps1
          }
      - name: Generate offline package audit reports
        run: |
          .\my_bucket\tools\package-audit\Find-Existing.ps1
          .\my_bucket\tools\package-audit\Build-ContractEvidenceReports.ps1
          .\my_bucket\tools\package-audit\New-CandidateReport.ps1
          .\my_bucket\tools\package-audit\Find-InstalledCandidates.ps1
          .\my_bucket\tools\package-audit\Build-SotaReadinessReport.ps1
